<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23302b63'/%3E%3Ctext x='50' y='68' font-size='60' text-anchor='middle'%3E%F0%9F%A6%86%3C/text%3E%3C/svg%3E">
<title>Countdown bis 31.12.2026</title>
<style>
  :root {
    --bg-1: #0f0c29;
    --bg-2: #302b63;
    --bg-3: #24243e;
    --accent: #ffcc70;
    --text: #f5f5f7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, var(--bg-1), var(--bg-2), var(--bg-3));
    background-size: 400% 400%;
    animation: gradientShift 18s ease infinite;
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    padding: 20px;
    overflow: hidden;
  }

  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .countdown {
    display: flex;
    gap: clamp(10px, 3vw, 30px);
    flex-wrap: wrap;
    justify-content: center;
  }

  .unit {
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 16px;
    padding: clamp(16px, 3vw, 30px) clamp(14px, 3vw, 26px);
    min-width: clamp(80px, 18vw, 140px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }

  .unit .value {
    font-size: clamp(2.2rem, 8vw, 4.5rem);
    font-weight: 700;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }

  .unit .label {
    margin-top: 10px;
    font-size: clamp(0.7rem, 1.5vw, 0.95rem);
    text-transform: uppercase;
    letter-spacing: 2px;
    opacity: 0.7;
  }

  .unit-ms {
    min-width: clamp(70px, 15vw, 110px);
  }

  .unit-ms .value {
    font-size: clamp(1.6rem, 6vw, 3.2rem);
    opacity: 0.85;
  }

  .finished {
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-weight: 700;
    color: var(--accent);
  }

  .duck {
    position: fixed;
    bottom: 0;
    left: 0;
    font-size: 3.5rem;
    z-index: 10;
    user-select: none;
    cursor: pointer;
    transition: transform 0.1s linear;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
  }

  .duck.walking {
    animation: waddle 0.3s ease-in-out infinite;
  }

  @keyframes waddle {
    0%, 100% { transform: translateY(0) scaleX(var(--dir, 1)); }
    50% { transform: translateY(-4px) scaleX(var(--dir, 1)); }
  }

  .streak-milestone {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: clamp(4rem, 20vw, 10rem);
    font-weight: 800;
    color: var(--accent);
    z-index: 20;
    pointer-events: none;
    animation: milestonePop 1s ease-out forwards;
  }

  @keyframes milestonePop {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
    15% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
    30% { transform: translate(-50%, -50%) scale(1); }
    80% { opacity: 1; }
    100% { opacity: 0; }
  }
</style>
</head>
<body>

  <div id="countdown" class="countdown">
    <div class="unit"><div class="value" id="days">--</div><div class="label">Tage</div></div>
    <div class="unit"><div class="value" id="hours">--</div><div class="label">Stunden</div></div>
    <div class="unit"><div class="value" id="minutes">--</div><div class="label">Minuten</div></div>
    <div class="unit"><div class="value" id="seconds">--</div><div class="label">Sekunden</div></div>
    <div class="unit unit-ms"><div class="value" id="milliseconds">--</div><div class="label">Millisek.</div></div>
  </div>

  <div class="duck" id="duck">🦆</div>

<script>
  const targetDate = new Date('2026-12-31T00:00:00');
  const countdownEl = document.getElementById('countdown');
  const daysEl = document.getElementById('days');
  const hoursEl = document.getElementById('hours');
  const minutesEl = document.getElementById('minutes');
  const secondsEl = document.getElementById('seconds');
  const millisecondsEl = document.getElementById('milliseconds');

  function pad(n, len = 2) {
    return String(n).padStart(len, '0');
  }

  let running = true;

  function update() {
    const now = new Date();
    const diff = targetDate - now;

    if (diff <= 0) {
      countdownEl.innerHTML = '<div class="finished">🎉 Das Zieldatum ist erreicht! 🎉</div>';
      running = false;
      return;
    }

    const totalMilliseconds = Math.floor(diff);
    const totalSeconds = Math.floor(totalMilliseconds / 1000);
    const days = Math.floor(totalSeconds / 86400);
    const hours = Math.floor((totalSeconds % 86400) / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;
    const milliseconds = totalMilliseconds % 1000;

    daysEl.textContent = days;
    hoursEl.textContent = pad(hours);
    minutesEl.textContent = pad(minutes);
    secondsEl.textContent = pad(seconds);
    millisecondsEl.textContent = pad(milliseconds, 3);

    requestAnimationFrame(update);
  }

  update();

  // Die Ente wandert ab und zu quer über den Bildschirm.
  // Jeder Klick auf die Ente kehrt ihre Laufrichtung um, sodass man sie
  // theoretisch endlos im Bild halten kann, bevor sie einen Rand erreicht.
  const duck = document.getElementById('duck');
  const DUCK_BASE_SPEED = 0.15; // px/ms
  const DUCK_SPEED_STEP = 0.01; // Geschwindigkeitszuwachs pro Klick
  const DUCK_MAX_SPEED = 0.6; // Deckel, damit sie nicht unspielbar schnell wird
  const DUCK_MARGIN = 100; // px außerhalb des Bildschirms, ab der sie "entkommen" ist

  let duckX = 0;
  let duckDir = 1;
  let duckSpeed = DUCK_BASE_SPEED;
  let duckActive = false;
  let lastTimestamp = null;
  let clickStreak = 0;

  function randomEdgeY() {
    return Math.random() * (window.innerHeight - 60);
  }

  function showMilestone(n) {
    const el = document.createElement('div');
    el.className = 'streak-milestone';
    el.textContent = n;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1000);
  }

  function registerClick() {
    if (!duckActive) return;
    duckDir *= -1;
    duckSpeed = Math.min(DUCK_MAX_SPEED, duckSpeed + DUCK_SPEED_STEP);
    clickStreak++;
    if (clickStreak >= 20 && (clickStreak - 20) % 10 === 0) {
      showMilestone(clickStreak);
    }
  }

  function escapeDuck() {
    duckActive = false;
    duck.classList.remove('walking');
    clickStreak = 0;
    scheduleDuck();
  }

  function tick(timestamp) {
    if (!duckActive) return;
    const dt = timestamp - lastTimestamp;
    lastTimestamp = timestamp;

    duckX += duckDir * duckSpeed * dt;
    duck.style.left = duckX + 'px';
    duck.style.setProperty('--dir', duckDir);

    if (duckX < -DUCK_MARGIN || duckX > window.innerWidth + DUCK_MARGIN) {
      escapeDuck();
      return;
    }

    requestAnimationFrame(tick);
  }

  function startWalk() {
    duckSpeed = DUCK_BASE_SPEED;
    duckDir = Math.random() > 0.5 ? 1 : -1;
    duckX = duckDir === 1 ? -DUCK_MARGIN : window.innerWidth + DUCK_MARGIN;
    duck.style.bottom = randomEdgeY() + 'px';
    duck.style.left = duckX + 'px';
    duck.style.setProperty('--dir', duckDir);
    duck.classList.add('walking');
    duckActive = true;
    lastTimestamp = performance.now();
    requestAnimationFrame(tick);
  }

  function scheduleDuck() {
    const delay = Math.random() * 10000;
    setTimeout(startWalk, delay);
  }

  duck.addEventListener('click', registerClick);

  scheduleDuck();
</script>

</body>
</html>
